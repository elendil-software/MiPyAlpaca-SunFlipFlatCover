{% args srvcfg %}
<!DOCTYPE html>
<html>

<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
    }

    input[type=text],
    select,
    textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid rgb(250, 161, 27);
      border-radius: 4px;
      resize: vertical;
      float: right;

    }

    label {
      padding: 12px 12px 12px 0;
      display: inline-block;
    }

    input[type=submit] {
      background-color: #088bf6;
      color: white;
      padding: 12px 20px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      float: right;
    }

    input[type=submit]:hover {
      background-color: #082cf6;
    }

    .container {
      border-radius: 5px;
      background-color: rgb(249, 177, 59);
      padding: 20px;
    }

    .col-space {
      float: left;
      width: 10%;
      margin-top: 6px;
    }


    .col-label {
      float: left;
      width: 25%;
      margin-top: 6px;
    }

    .col-input {
      float: left;
      width: 25%;
      margin-top: 6px;
    }

    .title {
      text-align: center;
    }

    /* Clear floats after the columns */
    .row:after {
      content: "";
      display: table;
      clear: both;
    }

    /* Responsive layout - when the screen is less than 600px wide, make the two columns stack on top of each other instead of next to each other */
    @media screen and (max-width: 600px) {
      .col-label,
      .col-input,
      .col-space,
      input[type=submit] {
        width: 100%;
        margin-top: 0;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="title">
      <h1>Sun Flip Flat Cover Alpaca Server Setup</h1>
    </div>

    <form form method="POST">
      <div class="row">
        <div class="col-space"></div>
        <div class="col-label"><b>Network Mode</b></div>
      </div>
      <div class="row">
        <div class="col-space"></div>
        <div class="col-label">
          <label for="srvport">Server Port</label>
        </div>
        <div class="col-input">
          <input type="text" id="srvport" name="srvport" value={{ srvcfg["serverPort"] }} maxlength="5">
        </div>
      </div>
      <div class="row">
        <div class="col-space"></div>
        <div class="col-label">
          <label for="discport">Discovery Port</label>
        </div>
        <div class="col-input">
          <input type="text" id="discport" name="discport" value={{ srvcfg["discoveryPort"] }} maxlength="5">
        </div>
      </div>

      <div class="row"><br></div>
      <div class="row">
        <div class="col-space"></div>
        <div class="col-label"><b>Network Mode</b></div>
      </div>
      <div class="row">
        <div class="col-space"></div>
        <div class="col-label">
          <label for="netmode">Mode</label>
        </div>
        <div class="col-input">
          <select id="netmode" name="netmode" onchange="toggleApFields()">
            {% if srvcfg["networkMode"] == "ap" %}
            <option value="station">Station (connect to WiFi)</option>
            <option value="ap" selected>Access Point (no WiFi needed)</option>
            {% else %}
            <option value="station" selected>Station (connect to WiFi)</option>
            <option value="ap">Access Point (no WiFi needed)</option>
            {% endif %}
          </select>
        </div>
      </div>
      <div class="row" id="row-apssid">
        <div class="col-space"></div>
        <div class="col-label">
          <label for="apssid">AP SSID</label>
        </div>
        <div class="col-input">
          <input type="text" id="apssid" name="apssid" value={{ srvcfg["apSsid"] }} maxlength="32">
        </div>
      </div>
      <div class="row" id="row-appassword">
        <div class="col-space"></div>
        <div class="col-label">
          <label for="appassword">AP Password</label>
        </div>
        <div class="col-input">
          <input type="text" id="appassword" name="appassword" value={{ srvcfg["apPassword"] }} maxlength="63">
        </div>
      </div>

      <div class="row">
        <br>
        <input type="submit" value="Save &amp; Reboot to apply">
      </div>
    </form>
  </div>
</body>

<script>
  function toggleApFields() {
    var mode = document.getElementById("netmode").value;
    var visible = mode === "ap";
    document.getElementById("row-apssid").style.display = visible ? "" : "none";
    document.getElementById("row-appassword").style.display = visible ? "" : "none";
  }
  // Run on page load
  toggleApFields();
</script>

</html>
