{% args devname, cfgfile, cfg %}
<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    * { box-sizing: border-box; }
    body { font-family: Arial, Helvetica, sans-serif; }

    input[type=text], input[type=number], select {
      width: 100%;
      padding: 12px;
      border: 1px solid rgb(250, 161, 27);
      border-radius: 4px;
    }

    label { padding: 12px 12px 12px 0; display: inline-block; }

    input[type=submit] {
      background-color: #088bf6;
      color: white;
      padding: 12px 20px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      float: right;
    }
    input[type=submit]:hover { background-color: #082cf6; }

    .container {
      border-radius: 5px;
      background-color: rgb(249, 177, 59);
      padding: 20px;
    }
    .title { text-align: center; }

    .col-space { float: left; width: 10%; margin-top: 6px; }
    .col-label { float: left; width: 35%; margin-top: 6px; }
    .col-input { float: left; width: 25%; margin-top: 6px; }

    .row:after { content: ""; display: table; clear: both; }

    @media screen and (max-width: 600px) {
      .col-label, .col-input, .col-space, input[type=submit] {
        width: 100%; margin-top: 0;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="title">
      <h2>MiPyAlpaca {{ devname }}</h2>
      <h3>Setup</h3>
    </div>

    <form method="POST">
      <div class="row">
        <div class="col-space"></div>
        <div class="col-label"><b>Cover Servo Settings</b></div>
      </div>

      <div class="row">
        <div class="col-space"></div>
        <div class="col-label"><label for="servo_number">Servo Number</label></div>
        <div class="col-input">
          <input type="number" id="servo_number" name="servo_number" value={{ cfg["servo_number"] }} min="1" max="8">
        </div>
      </div>

      <div class="row">
        <div class="col-space"></div>
        <div class="col-label"><label for="servo_open_angle">Servo Open Angle (°)</label></div>
        <div class="col-input">
          <input type="number" id="servo_open_angle" name="servo_open_angle" value={{ cfg["servo_open_angle"] }} min="0" max="360">
        </div>
      </div>

      <div class="row">
        <div class="col-space"></div>
        <div class="col-label"><label for="servo_close_angle">Servo Close Angle (°)</label></div>
        <div class="col-input">
          <input type="number" id="servo_close_angle" name="servo_close_angle" value={{ cfg["servo_close_angle"] }} min="0" max="360">
        </div>
      </div>

      <div class="row">
        <div class="col-space"></div>
        <div class="col-label"><label for="max_degrees">Max Degrees (°)</label></div>
        <div class="col-input">
          <input type="number" id="max_degrees" name="max_degrees" value={{ cfg["max_degrees"] }} min="1" max="360">
        </div>
      </div>

      <div class="row">
        <div class="col-space"></div>
        <div class="col-label"><label for="move_time_ms">Move Time (ms)</label></div>
        <div class="col-input">
          <input type="number" id="move_time_ms" name="move_time_ms" value={{ cfg["move_time_ms"] }} min="100" max="30000">
        </div>
      </div>

      <div class="row"><br></div>
      <div class="row">
        <input type="submit" value="Save settings">
      </div>
    </form>
  </div>
</body>
</html>
